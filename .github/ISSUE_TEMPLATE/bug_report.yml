name: Bug report
description: Report a reproducible problem in FlitPDF
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App or commit version
      description: Release version, branch name, or commit SHA
      placeholder: main / v1.0.0 / abc1234
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Scanner
        - PDF tools
        - File viewer
        - Authentication
        - Settings
        - Build / setup
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Device, Android version, Flutter version, and anything else relevant
      placeholder: Android 14, Pixel 7, Flutter 3.x
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or add screenshots. Remove secrets first.
      render: shell
